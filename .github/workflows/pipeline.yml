name: Main CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Check Quality (Lint & Test)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (fresh for Linux bindings)
      run: |
        rm -f package-lock.json
        npm install
      env:
        npm_config_optional: true

    - name: Install Functions dependencies
      working-directory: ./functions
      run: npm ci

    - name: Lint (Check Types)
      run: npm run lint

    - name: Unit Tests
      run: npm run test

    - name: Build Functions
      working-directory: ./functions
      run: |
        npm run lint || (echo "::error::Linter failed in functions" && exit 1)
        npm run build || (echo "::error::Build failed in functions" && exit 1)

  e2e:
    name: E2E Tests (Playwright)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (fresh for Linux bindings)
      run: |
        rm -f package-lock.json
        npm install
      env:
        npm_config_optional: true

    - name: Install Playwright
      run: npx playwright install --with-deps
    - name: Run E2E
      run: npm run test:e2e
      env:
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

  deploy:
    name: Deploy to Firebase
    needs: [ci, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (fresh for Linux bindings)
      run: |
        rm -f package-lock.json
        npm install
      env:
        npm_config_optional: true

    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JORNLIFT }}'

    - name: Build Frontend
      run: npm run build

    - name: Install Functions dependencies
      working-directory: ./functions
      run: npm ci

    - name: Build Functions
      working-directory: ./functions
      run: npm run build

    - name: Deploy Hosting
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: "${{ secrets.GITHUB_TOKEN }}"
        firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JORNLIFT }}"
        channelId: live
        projectId: jornlift

    - name: Deploy Functions
      run: ./node_modules/.bin/firebase deploy --only functions --project jornlift
