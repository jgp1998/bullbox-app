name: Main CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write
  pull-requests: write

env:
  HUSKY: '0'

jobs:
  ci:
    name: Check Quality (Lint & Test)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install
        npm install --no-save @tailwindcss/oxide
      env:
        npm_config_optional: true

    - name: Cache Functions dependencies
      uses: actions/cache@v4
      with:
        path: functions/node_modules
        key: ${{ runner.os }}-functions-${{ hashFiles('functions/package-lock.json') }}

    - name: Install Functions dependencies
      working-directory: ./functions
      run: npm install

    - name: Lint (Check Types)
      run: npm run lint

    - name: Unit Tests
      run: npm run test

    - name: Build Functions
      working-directory: ./functions
      run: |
        npm run lint || (echo "::error::Linter failed in functions" && exit 1)
        npm run build || (echo "::error::Build failed in functions" && exit 1)


  release:
    name: Automated Release (standard-version)
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install
        npm install --no-save @tailwindcss/oxide
      env:
        npm_config_optional: true

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run standard-version
      run: npm run release

    - name: Push release changes
      run: git push --follow-tags origin main

  deploy:
    name: Deploy to Firebase
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install
        npm install --no-save @tailwindcss/oxide
      env:
        npm_config_optional: true

    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JORNLIFT }}'

    - name: Verify Build Secrets
      run: |
        echo "Checking environment variables for build..."
        [ -z "$VITE_FIREBASE_API_KEY" ] && echo "::error::VITE_FIREBASE_API_KEY is MISSING" || echo "VITE_FIREBASE_API_KEY is present"
        [ -z "$VITE_FIREBASE_PROJECT_ID" ] && echo "::error::VITE_FIREBASE_PROJECT_ID is MISSING" || echo "VITE_FIREBASE_PROJECT_ID is present"
        [ -z "$VITE_FIREBASE_APP_ID" ] && echo "::error::VITE_FIREBASE_APP_ID is MISSING" || echo "VITE_FIREBASE_APP_ID is present"
      env:
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    - name: Build Frontend
      run: npm run build
      env:
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

    - name: Cache Functions dependencies
      uses: actions/cache@v4
      with:
        path: functions/node_modules
        key: ${{ runner.os }}-functions-${{ hashFiles('functions/package-lock.json') }}

    - name: Install Functions dependencies
      working-directory: ./functions
      run: npm install

    - name: Build Functions
      working-directory: ./functions
      run: npm run build

    - name: Deploy Hosting
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: "${{ secrets.GITHUB_TOKEN }}"
        firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JORNLIFT }}"
        channelId: live
        projectId: jornlift

    - name: Deploy Functions
      run: ./node_modules/.bin/firebase deploy --only functions --project jornlift

    - name: Deploy Firestore Rules
      run: ./node_modules/.bin/firebase deploy --only firestore:rules --project jornlift

